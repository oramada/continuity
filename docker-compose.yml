services:
  # DEV ONLY: this stack uses local passwords, public Hardhat keys, and deterministic
  # local contract addresses. Never reuse these values for testnet or mainnet.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tsl
      POSTGRES_USER: tsl
      POSTGRES_PASSWORD: tsl_dev_only
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsl"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  hardhat:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run chain -- --hostname 0.0.0.0"
    ports:
      - "8545:8545"

  contract-deployer:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && sleep 5 && npm run contracts:deploy:local"
    depends_on:
      - hardhat

  relay-node:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run relay"
    environment: &service_env
      TSL_DATABASE_URL: postgres://tsl:tsl_dev_only@postgres:5432/tsl
      TSL_QUEUE_URL: redis://redis:6379
      TSL_SETTLEMENT_RPC_URL: http://hardhat:8545
      TSL_CHECKPOINT_REGISTRY_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      TSL_TRUST_ID_REGISTRY_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      TSL_REVOCATION_REGISTRY_ADDRESS: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      TSL_PROVIDER_REGISTRY_ADDRESS: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
      TSL_GOVERNANCE_REGISTRY_ADDRESS: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
      # DEV ONLY: public Hardhat account 0 private key. Never fund or reuse.
      TSL_SETTLEMENT_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      TSL_RELAY_ID: did:tsl:relay:dev
      TSL_RELAY_SIGNATURE: "0x01"
      TSL_EPOCH_MS: 300000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - contract-deployer

  log-node:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run log"
    environment: *service_env
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - contract-deployer

  resolver-node:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run resolver"
    environment: *service_env
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - contract-deployer

  verifier-api:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run verifier"
    environment: *service_env
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - contract-deployer

  scoring-provider:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run scoring-provider"
    environment:
      <<: *service_env
      TSL_SCORING_PROVIDER_ID: did:tsl:provider:local
      TSL_SCORING_PROVIDER_SEED_HEX: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - contract-deployer

  auditor-node:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run auditor"
    environment: *service_env
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - contract-deployer

  checkpoint-submitter:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run checkpoint-submitter"
    environment: *service_env
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - hardhat
      - contract-deployer

  web-verifier:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -lc "npm install && npm run web-verifier"
    ports:
      - "8090:8090"
