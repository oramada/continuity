openapi: 3.1.0
info:
  title: Trust Signature Layer API
  version: 0.1.0
paths:
  /v1/identity/create:
    post:
      summary: Register a local TrustID document.
      responses:
        "200": { description: Identity accepted }
  /v1/identity/{trustId}:
    get:
      summary: Resolve a TrustID document.
      parameters:
        - in: path
          name: trustId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Identity document }
  /v1/commitments:
    post:
      summary: Submit an event commitment.
      responses:
        "200": { description: Event accepted }
  /v1/receipts:
    post:
      summary: Submit a receipt commitment.
      responses:
        "200": { description: Receipt accepted }
  /v1/attestations:
    post:
      summary: Submit a signed attestation.
      responses:
        "200": { description: Attestation accepted }
  /v1/keys/revoke:
    post:
      summary: Submit a signed revocation event.
      responses:
        "200": { description: Revocation accepted }
  /v1/keys/rotate:
    post:
      summary: Submit a signed rotation revocation with replacement key.
      responses:
        "200": { description: Rotation accepted }
  /v1/proofs/{commitment}:
    get:
      summary: Fetch a portable event proof bundle with identity, revocations, receipts, attestations, and optional assessment when available.
      parameters:
        - in: path
          name: commitment
          required: true
          schema: { type: string }
      responses:
        "200": { description: Proof bundle }
  /v1/proofs/{treeKind}/{commitment}:
    get:
      summary: Fetch an inclusion proof and checkpoint for event, receipt, attestation, or revocation trees.
      parameters:
        - in: path
          name: treeKind
          required: true
          schema: { enum: [event, receipt, attestation, revocation] }
        - in: path
          name: commitment
          required: true
          schema: { type: string }
      responses:
        "200": { description: Inclusion proof and checkpoint }
  /v1/consistency/{epoch}/{shard}:
    get:
      summary: Fetch a checkpoint-chain consistency proof for a shard up to an epoch.
      responses:
        "200": { description: Consistency proof }
        "404": { description: Not enough checkpoint history }
  /v1/log/consume-once:
    post:
      summary: Consume accepted object messages from Redis Streams once.
      responses:
        "200": { description: Queue consumption counts }
  /v1/log/close-epoch:
    post:
      summary: Close a Postgres-backed epoch/shard and build a checkpoint.
      responses:
        "200": { description: Checkpointed epoch }
  /v1/checkpoints/{epoch}/{shard}:
    get:
      summary: Fetch a checkpoint.
      parameters:
        - in: path
          name: epoch
          required: true
          schema: { type: integer }
        - in: path
          name: shard
          required: true
          schema: { type: string }
      responses:
        "200": { description: Checkpoint }
  /v1/checkpoints/{epoch}/{shard}/submit:
    post:
      summary: Submit checkpoint to configured settlement backend.
      responses:
        "200": { description: Checkpoint settled }
  /v1/verify:
    post:
      summary: Verify envelope, optional proof, checkpoint, receipts, attestations, revocations, assessment, consistency proofs, non-membership proofs, governance policy, and agent delegations.
      responses:
        "200": { description: Verified }
        "422": { description: Verification failed }
  /v1/assessments:
    post:
      summary: Request or submit a signed trust assessment.
      responses:
        "200": { description: Assessment accepted }
  /v1/assessments/v2:
    post:
      summary: Request or submit a signed TrustAssessmentV2 with scoring profile, domain policy, and evidence coverage.
      responses:
        "200": { description: V2 assessment accepted }
        "422": { description: V2 assessment validation failed }
  /v1/scoring/profiles:
    get:
      summary: List active scoring profiles.
      responses:
        "200": { description: Scoring profiles }
    post:
      summary: Submit a signed scoring_profile.v2 object.
      responses:
        "200": { description: Scoring profile accepted }
  /v1/scoring/model-cards:
    post:
      summary: Submit a signed model_card.v2 and linked evaluation report commitment.
      responses:
        "200": { description: Model card accepted }
  /v1/graph/features:
    post:
      summary: Compute or submit graph_feature_vector.v1, sybil_assessment.v1, and drift_report.v1 artifacts.
      responses:
        "200": { description: Graph artifacts accepted }
  /v1/metadata-fingerprints:
    post:
      summary: Submit a metadata_fingerprint_commitment.v1 without raw metadata.
      responses:
        "200": { description: Metadata fingerprint commitment accepted }
  /v1/delegation/policies:
    post:
      summary: Submit a signed delegation_policy.v2.
      responses:
        "200": { description: Delegation policy accepted }
  /v1/delegation/actions/verify:
    post:
      summary: Verify an agent_action.v2 against a delegation_policy.v2 chain.
      responses:
        "200": { description: Delegated action verification result }
  /v1/audit/checkpoint:
    post:
      summary: Submit or run a checkpoint audit finding.
      responses:
        "200": { description: Audit result }
  /v1/audit/checkpoint-conflict:
    post:
      summary: Check an incoming checkpoint against local state and sign a critical conflict finding when roots differ.
      responses:
        "200": { description: No conflict }
        "409": { description: Conflict finding }
  /v1/audit/checkpoints/{epoch}/{shard}:
    get:
      summary: Check auditor view of a checkpoint.
      responses:
        "200": { description: Audit lookup result }
  /v1/audit/findings:
    get:
      summary: Fetch persisted audit findings, optionally filtered by checkpoint hash.
      responses:
        "200": { description: Audit findings }
  /v1/gossip/peers:
    get:
      summary: List configured gossip peers.
      responses:
        "200": { description: Peer list }
    post:
      summary: Register a gossip peer URL.
      responses:
        "200": { description: Peer accepted }
  /v1/gossip/checkpoint-summaries:
    get:
      summary: Fetch recent checkpoint summaries for gossip comparison.
      responses:
        "200": { description: Checkpoint summaries }
  /v1/gossip/checkpoint-summary:
    post:
      summary: Import a checkpoint summary/checkpoint from a peer and reject root conflicts.
      responses:
        "200": { description: Checkpoint summary accepted }
        "409": { description: Conflicting checkpoint root }
  /v1/gossip/sync:
    post:
      summary: Pull checkpoint summaries and audit findings from configured or supplied peers.
      responses:
        "200": { description: Gossip sync result }
  /v1/gossip/audit-finding:
    post:
      summary: Import or relay a signed audit finding.
      responses:
        "200": { description: Audit finding accepted }
  /v1/gossip/audit-findings:
    get:
      summary: Fetch signed audit findings from an auditor or log node.
      responses:
        "200": { description: Audit findings }
  /v1/release/health:
    get:
      summary: Fetch service health and configured capability flags.
      responses:
        "200": { description: Release health }
  /v1/abuse/evidence:
    post:
      summary: Submit evidence metadata for a high-impact negative attestation.
      responses:
        "200": { description: Evidence metadata accepted }
  /v1/abuse/appeals:
    get:
      summary: List local appeal records.
      responses:
        "200": { description: Appeal records }
    post:
      summary: Submit appeal metadata for a negative attestation.
      responses:
        "200": { description: Appeal accepted }
